<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Shooter</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #07111a;
      overflow: hidden;
      font-family: "Courier New", monospace;
    }

    #gc {
      position: fixed;
      inset: 0;
      font-family: "Courier New", monospace;
    }

    #c {
      position: absolute;
      inset: 0;
      background: #0a0a1a;
      cursor: crosshair;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      pointer-events: none;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
    }

    #hud span {
      color: #7ef8ff;
      font-size: 24px;
      font-weight: 700;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 18px;
      border-radius: 8px;
    }

    #ov {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 5, 18, 0.9);
    }

    #ov h2 {
      color: #7ef8ff;
      font-size: 34px;
      margin: 0 0 8px;
      letter-spacing: 2px;
    }

    #ov p {
      color: #aaa;
      font-size: 18px;
      margin: 0 0 18px;
      text-align: center;
      line-height: 1.8;
      white-space: pre-line;
    }

    #ov button {
      background: transparent;
      border: 1px solid #7ef8ff;
      color: #7ef8ff;
      padding: 14px 38px;
      font-family: "Courier New", monospace;
      font-size: 18px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
    }

    #ov button:hover {
      background: rgba(126, 248, 255, 0.12);
    }

    #adm {
      display: none;
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(5, 15, 25, 0.97);
      border: 1px solid #ff0;
      border-radius: 8px;
      padding: 12px 18px;
      min-width: 320px;
      z-index: 10;
    }

    #adm .atitle {
      color: #ff0;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-align: center;
    }

    #adm .arow {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    #adm button {
      background: transparent;
      border: 1px solid #ff0;
      color: #ff0;
      font-family: "Courier New", monospace;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 1px;
    }

    #adm button:hover {
      background: rgba(255, 255, 0, 0.12);
    }

    #adm .aclose {
      position: absolute;
      top: 6px;
      right: 10px;
      border: none;
      color: #ff0;
      font-size: 14px;
      padding: 2px 6px;
      background: transparent;
      cursor: pointer;
    }

    #cheat {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 0, 0.15);
      font-size: 12px;
      pointer-events: none;
      letter-spacing: 1px;
    }

    @media (max-width: 760px) {
      #hud {
        padding: 8px 10px;
      }

      #hud span {
        font-size: 15px;
        padding: 5px 8px;
      }

      #ov h2 {
        font-size: 22px;
      }

      #ov p {
        font-size: 13px;
        padding: 0 12px;
      }
    }
  </style>
</head>
<body>
  <div id="gc">
    <canvas id="c"></canvas>
    <div id="hud">
      <span id="sc">SCORE: 0</span>
      <span id="wv">WAVE 1/20</span>
      <span id="lv">HP: 3</span>
    </div>
    <div id="ov">
      <h2>SPACE SHOOTER</h2>
      <p>WASD / arrows - movement
Hold left mouse button - shooting
SPACE - also shoots</p>
      <button id="sb">START</button>
    </div>
    <div id="adm">
      <button class="aclose" id="admclose">X</button>
      <div class="atitle">ADMIN PANEL</div>
      <div class="arow">
        <button id="askip">SKIP WAVE</button>
        <button id="arapid">RAPID FIRE</button>
        <button id="aclear">CLEAR ENEMIES</button>
      </div>
    </div>
    <div id="cheat">armacheat</div>
  </div>
  <script>
    const root = document.getElementById("gc");
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    let W = 0;
    let H = 0;
    let state = "menu";
    let score = 0;
    let lives = 3;
    let wave = 1;
    let frame = 0;
    let player;
    let bullets;
    let enemies;
    let particles;
    let explosions;
    let stars;
    let keys = {};
    let cooldown = 0;
    let wt = 0;
    let mouseDown = false;
    let rapidFire = false;
    let rapidTimer = 0;
    let cheatBuf = "";
    let waveQueued = false;
    const WAVE_INTRO_FRAMES = 72;
    const ADMIN_CODE = "armacheat";

    function resizeGame() {
      const prevW = W || 680;
      const prevH = H || 480;
      const rect = root.getBoundingClientRect();
      W = Math.max(320, Math.floor(rect.width));
      H = Math.max(240, Math.floor(rect.height));
      canvas.width = W;
      canvas.height = H;

      if (player) {
        player.x = (player.x / prevW) * W;
        player.y = (player.y / prevH) * H;
      }

      if (enemies && enemies.length) {
        enemies.forEach((e) => {
          e.baseX = (e.baseX / prevW) * W;
          e.x = (e.x / prevW) * W;
          e.y = (e.y / prevH) * H;
        });
      }

      if (stars && stars.length) {
        stars.forEach((s) => {
          s.x = Math.min(W, (s.x / prevW) * W);
          s.y = Math.min(H, (s.y / prevH) * H);
        });
      }
    }

    function viewScale() {
      return Math.max(1, Math.min(W / 680, H / 480, 2.1));
    }

    function playerSize() {
      return 1.4 * viewScale();
    }

    function enemySize(type) {
      const base = type === "boss" ? 1.5 : type === "fast" ? 1.2 : 1.3;
      return base * viewScale();
    }

    const SHAPES = [
      [[0, -2], [-1, -1], [1, -1], [-2, 0], [2, 0]],
      [[0, -2], [-1, -1], [1, -1], [-2, 0], [2, 0], [-1, 1], [1, 1], [0, 2]],
      [[0, -2], [0, -1], [0, 0], [0, 1], [0, 2], [-2, 0], [-1, 0], [1, 0], [2, 0]],
      [[0, -2], [-1, -1], [1, -1], [-2, 0], [2, 0], [-3, 1], [3, 1], [-1, 1], [1, 1]],
      [[0, -3], [2, -2], [3, 0], [2, 2], [0, 3], [-2, 2], [-3, 0], [-2, -2]],
      [[0, -3], [2, -2], [3, 0], [2, 2], [0, 3], [-2, 2], [-3, 0], [-2, -2], [0, 0]],
      [[-3, -2], [-2, -1], [-1, 0], [0, 1], [1, 0], [2, -1], [3, -2], [-1, -2], [1, -2]],
      [[0, -3], [2, -1], [3, 1], [1, 2], [-1, 2], [-3, 1], [-2, -1], [0, 0], [1, -1], [-1, -1]],
      [[-4, -1], [-3, 0], [-2, 1], [-1, 0], [0, -1], [1, 0], [2, 1], [3, 0], [4, -1]],
      [[-2, -3], [0, -3], [2, -3], [-3, -1], [3, -1], [-3, 1], [3, 1], [-1, 2], [1, 2], [0, -1]]
    ];

    function getFormation(w) {
      const idx = Math.min(Math.floor((w - 1) / 2), SHAPES.length - 1);
      const base = SHAPES[idx].map((p) => [...p]);
      if (w <= 2) return base.slice(0, 5);
      if (w > 14) {
        const ext = [];
        base.forEach(([x, y]) => {
          ext.push([x - 2, y]);
          ext.push([x + 2, y]);
        });
        const seen = new Set();
        return ext.filter(([x, y]) => {
          const key = x + "," + y;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }
      if (w > 10) {
        const ext = [];
        base.forEach(([x, y]) => {
          ext.push([x, y]);
          ext.push([x + 3, y]);
        });
        const seen = new Set();
        return ext.filter(([x, y]) => {
          const key = x + "," + y;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }
      return base;
    }

    function waveConfig(w) {
      const t = (w - 1) / 19;
      return {
        swayAmp: w <= 2 ? 0 : 4 + t * 40,
        swaySpd: w <= 2 ? 0 : 0.005 + t * 0.028,
        shootRate: w <= 2 ? 400 : Math.max(35, 380 - t * 345),
        bulletSpd: 1.2 + t * 4
      };
    }

    function spawnWave() {
      enemies = [];
      bullets = [];
      frame = 0;
      waveQueued = false;
      const form = getFormation(wave);
      const cfg = waveConfig(wave);
      const cx = W / 2;
      const cy = Math.max(115, H * 0.24);
      const maxScaleFromWidth = W / 13.5;
      const maxScaleFromHeight = H / 9.5;
      const maxScaleFromTop = (cy - 34) / 2;
      const scale = Math.max(26, Math.min(maxScaleFromWidth, maxScaleFromHeight, maxScaleFromTop));
      form.forEach(([dx, dy], i) => {
        const type = wave <= 2 ? "basic" : i % 6 === 0 && wave > 5 ? "boss" : i % 3 === 0 && wave > 3 ? "fast" : "basic";
        const baseX = Math.max(40, Math.min(W - 40, cx + dx * scale));
        const y = Math.max(36, Math.min(H * 0.68, cy + dy * scale));
        enemies.push({ x: baseX, y, baseX, type, hp: type === "boss" ? 2 : 1, shootTimer: 80 + Math.random() * cfg.shootRate, cfg });
      });
    }

    function init() {
      resizeGame();
      score = 0;
      lives = 3;
      wave = 1;
      frame = 0;
      cooldown = 0;
      wt = 0;
      waveQueued = false;
      mouseDown = false;
      rapidFire = false;
      rapidTimer = 0;
      player = { x: W / 2, y: H - Math.max(80, H * 0.12), invul: 0 };
      bullets = [];
      enemies = [];
      particles = [];
      explosions = [];
      stars = Array.from({ length: 80 }, () => ({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 1.4 + 0.3, spd: Math.random() * 0.4 + 0.15 }));
      spawnWave();
    }

    function spark(x, y, col, n) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 3 + 1;
        particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, col, sz: Math.random() * 2.5 + 1 });
      }
    }

    function drawShip(x, y, inv) {
      if (inv > 0 && Math.floor(inv / 5) % 2) return;
      const s = playerSize();
      ctx.save();
      ctx.translate(x, y);
      const g = ctx.createLinearGradient(0, -20 * s, 0, 20 * s);
      g.addColorStop(0, rapidFire ? "#ffee44" : "#7ef8ff");
      g.addColorStop(1, rapidFire ? "#aa6600" : "#1a6a8a");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(0, -16 * s);
      ctx.lineTo(14 * s, 10 * s);
      ctx.lineTo(6 * s, 6 * s);
      ctx.lineTo(0, 10 * s);
      ctx.lineTo(-6 * s, 6 * s);
      ctx.lineTo(-14 * s, 10 * s);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#fff8a0";
      ctx.beginPath();
      ctx.arc(0, -2 * s, 4.5 * s, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawEnemy(e) {
      const s = enemySize(e.type);
      ctx.save();
      ctx.translate(e.x, e.y);
      if (e.type === "boss") {
        ctx.fillStyle = e.hp === 2 ? "#ff4466" : "#ff8899";
        ctx.beginPath();
        ctx.moveTo(0, -12 * s);
        ctx.lineTo(12 * s, 8 * s);
        ctx.lineTo(6 * s, 4 * s);
        ctx.lineTo(0, 8 * s);
        ctx.lineTo(-6 * s, 4 * s);
        ctx.lineTo(-12 * s, 8 * s);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = Math.max(11, Math.round(10 * s)) + "px Courier New";
        ctx.textAlign = "center";
        ctx.fillText(e.hp, 0, 3 * s);
      } else if (e.type === "fast") {
        ctx.fillStyle = "#ffaa22";
        ctx.beginPath();
        ctx.moveTo(0, -10 * s);
        ctx.lineTo(10 * s, 8 * s);
        ctx.lineTo(0, 4 * s);
        ctx.lineTo(-10 * s, 8 * s);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillStyle = "#aa44ff";
        ctx.beginPath();
        ctx.moveTo(0, -11 * s);
        ctx.lineTo(11 * s, 8 * s);
        ctx.lineTo(4 * s, 4 * s);
        ctx.lineTo(0, 8 * s);
        ctx.lineTo(-4 * s, 4 * s);
        ctx.lineTo(-11 * s, 8 * s);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#cc88ff";
        ctx.beginPath();
        ctx.arc(0, -1 * s, 3.5 * s, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function nextWave() {
      if (wave >= 20) {
        state = "win";
        showOv("YOU WIN!", "All 20 waves cleared.\nScore: " + score, "PLAY AGAIN");
        return;
      }
      wave++;
      wt = WAVE_INTRO_FRAMES;
      spawnWave();
    }

    function update() {
      frame++;
      if (wt > 0) {
        wt--;
        return;
      }
      stars.forEach((s) => {
        s.y += s.spd;
        if (s.y > H) s.y = 0;
      });

      const shipRadius = 20 * playerSize();
      const spd = 5 * Math.min(1.6, viewScale());
      if (keys.ArrowLeft || keys.a || keys.A) player.x -= spd;
      if (keys.ArrowRight || keys.d || keys.D) player.x += spd;
      if (keys.ArrowUp || keys.w || keys.W) player.y -= spd;
      if (keys.ArrowDown || keys.s || keys.S) player.y += spd;
      player.x = Math.max(shipRadius, Math.min(W - shipRadius, player.x));
      player.y = Math.max(shipRadius, Math.min(H - shipRadius, player.y));

      if (player.invul > 0) player.invul--;
      if (cooldown > 0) cooldown--;
      if (rapidFire) {
        rapidTimer--;
        if (rapidTimer <= 0) rapidFire = false;
      }

      const fireRate = rapidFire ? 2 : 10;
      if ((keys[" "] || keys.z || mouseDown) && cooldown <= 0) {
        bullets.push({ x: player.x, y: player.y - 18 * playerSize(), spd: 13 * Math.min(1.5, viewScale()), own: "p" });
        if (rapidFire) {
          bullets.push({ x: player.x - 10 * playerSize(), y: player.y - 12 * playerSize(), spd: 13 * Math.min(1.5, viewScale()), own: "p" });
          bullets.push({ x: player.x + 10 * playerSize(), y: player.y - 12 * playerSize(), spd: 13 * Math.min(1.5, viewScale()), own: "p" });
        }
        cooldown = fireRate;
      }

      enemies.forEach((e) => {
        e.x = e.baseX + Math.sin(frame * e.cfg.swaySpd + e.baseX * 0.03) * e.cfg.swayAmp;
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          bullets.push({ x: e.x, y: e.y + 14 * enemySize(e.type), spd: e.cfg.bulletSpd * Math.min(1.5, viewScale()), own: "e" });
          e.shootTimer = e.cfg.shootRate * 0.5 + Math.random() * e.cfg.shootRate;
        }
      });

      bullets.forEach((b) => {
        b.y += b.own === "p" ? -b.spd : b.spd;
      });
      bullets = bullets.filter((b) => b.y > -20 && b.y < H + 20);

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (b.own !== "p") continue;
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          const hit = 15 * enemySize(e.type);
          if (Math.abs(b.x - e.x) < hit && Math.abs(b.y - e.y) < hit) {
            bullets.splice(i, 1);
            e.hp--;
            spark(e.x, e.y, e.type === "boss" ? "#ff4466" : e.type === "fast" ? "#ffaa22" : "#cc88ff", 5);
            if (e.hp <= 0) {
              explosions.push({ x: e.x, y: e.y, r: 0, life: 1 });
              spark(e.x, e.y, "#fff", 12);
              score += e.type === "boss" ? 30 : e.type === "fast" ? 15 : 10;
              enemies.splice(j, 1);
            }
            break;
          }
        }
      }

      if (player.invul <= 0) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          if (b.own !== "e") continue;
          const hit = 16 * playerSize();
          if (Math.abs(b.x - player.x) < hit && Math.abs(b.y - player.y) < hit) {
            bullets.splice(i, 1);
            lives--;
            player.invul = 100;
            spark(player.x, player.y, "#7ef8ff", 14);
            if (lives <= 0) {
              state = "over";
              showOv("GAME OVER", "Score: " + score + "\nReached wave: " + wave, "PLAY AGAIN");
            }
          }
        }
      }

      particles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.92;
        p.vy *= 0.92;
        p.life -= 0.04;
      });
      particles = particles.filter((p) => p.life > 0);
      explosions.forEach((e) => {
        e.r += 3;
        e.life -= 0.07;
      });
      explosions = explosions.filter((e) => e.life > 0);

      if (enemies.length === 0 && wt === 0 && !waveQueued) {
        waveQueued = true;
        nextWave();
      }

      document.getElementById("sc").textContent = "SCORE: " + score + (rapidFire ? " *" : "");
      document.getElementById("wv").textContent = "WAVE: " + wave + "/20";
      document.getElementById("lv").textContent = "HP: " + Math.max(0, lives);
    }

    function draw() {
      ctx.fillStyle = "#0a0a1a";
      ctx.fillRect(0, 0, W, H);
      stars.forEach((s) => {
        ctx.fillStyle = "rgba(200,220,255," + (s.s * 0.4) + ")";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.s / 2, 0, Math.PI * 2);
        ctx.fill();
      });

      if (wt > 0) {
        const a = Math.min(1, wt > WAVE_INTRO_FRAMES - 18 ? 1 : (WAVE_INTRO_FRAMES - wt) / 18);
        ctx.fillStyle = "rgba(126,248,255," + a + ")";
        ctx.font = "bold 34px Courier New";
        ctx.textAlign = "center";
        ctx.fillText("NEXT WAVE " + wave, W / 2, H / 2 - 16);
        ctx.font = "18px Courier New";
        ctx.fillStyle = "rgba(170,170,170," + a + ")";
        ctx.fillText("Get ready", W / 2, H / 2 + 20);
        return;
      }

      explosions.forEach((e) => {
        ctx.strokeStyle = "rgba(255,180,60," + e.life + ")";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
        ctx.stroke();
      });
      particles.forEach((p) => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.col;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      bullets.forEach((b) => {
        if (b.own === "p") {
          ctx.fillStyle = rapidFire ? "#ffee44" : "#7ef8ff";
          ctx.shadowBlur = 6;
          ctx.shadowColor = rapidFire ? "#ffee44" : "#7ef8ff";
          ctx.fillRect(b.x - 3, b.y - 12, 6, 18);
          ctx.shadowBlur = 0;
        } else {
          ctx.fillStyle = "#ff6644";
          ctx.fillRect(b.x - 3, b.y - 7, 6, 12);
        }
      });
      enemies.forEach((e) => drawEnemy(e));
      drawShip(player.x, player.y, player.invul);

      if (rapidFire) {
        ctx.fillStyle = "rgba(255,238,68,0.18)";
        ctx.font = "bold " + Math.max(14, Math.round(14 * viewScale())) + "px Courier New";
        ctx.textAlign = "left";
        ctx.fillText("* RAPID FIRE: " + Math.ceil(rapidTimer / 60) + "s", 14, H - 16);
      }
    }

    function loop() {
      if (state !== "playing") return;
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function showOv(t, p, b) {
      const o = document.getElementById("ov");
      o.querySelector("h2").textContent = t;
      o.querySelector("p").textContent = p;
      o.querySelector("button").textContent = b;
      o.style.display = "flex";
    }

    function toggleAdmin() {
      const adm = document.getElementById("adm");
      adm.style.display = adm.style.display === "block" ? "none" : "block";
    }

    document.getElementById("sb").addEventListener("click", () => {
      document.getElementById("ov").style.display = "none";
      init();
      state = "playing";
      loop();
    });

    document.getElementById("admclose").addEventListener("click", () => {
      document.getElementById("adm").style.display = "none";
    });

    document.getElementById("askip").addEventListener("click", () => {
      if (state === "playing") {
        enemies = [];
        bullets = [];
        waveQueued = false;
        nextWave();
      }
    });

    document.getElementById("arapid").addEventListener("click", () => {
      if (state === "playing") {
        rapidFire = true;
        rapidTimer = 600;
      }
    });

    document.getElementById("aclear").addEventListener("click", () => {
      if (state === "playing") {
        enemies.forEach((e) => {
          explosions.push({ x: e.x, y: e.y, r: 0, life: 1 });
          spark(e.x, e.y, "#fff", 10);
          score += 10;
        });
        enemies = [];
        bullets = [];
        waveQueued = false;
      }
    });

    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (e.key === " ") e.preventDefault();
      cheatBuf = (cheatBuf + e.key.toLowerCase()).slice(-ADMIN_CODE.length);
      if (cheatBuf.endsWith(ADMIN_CODE)) toggleAdmin();
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    canvas.addEventListener("mousedown", (e) => {
      if (e.button === 0) mouseDown = true;
    });

    document.addEventListener("mouseup", (e) => {
      if (e.button === 0) mouseDown = false;
    });

    window.addEventListener("resize", resizeGame);
    resizeGame();
  </script>
</body>
</html>
