<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Shooter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Doto:wght@628&display=swap');

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #07111a;
      overflow: hidden;
      font-family: "Courier New", monospace;
    }

    #gc {
      position: fixed;
      inset: 0;
      font-family: "Courier New", monospace;
    }

    #c {
      position: absolute;
      inset: 0;
      background: #0a0a1a;
      cursor: crosshair;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      pointer-events: none;
      padding: 10px 14px;
      display: flex;
      justify-content: center;
    }

    #hud span {
      color: #7ef8ff;
      font-size: 24px;
      font-weight: 700;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 18px;
      border-radius: 8px;
    }

    #sc {
      display: none;
    }

    #wv {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    #lv {
      position: absolute;
      right: 14px;
    }

    #ov {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 5, 18, 0.9);
    }

    #ov h2 {
      color: #7ef8ff;
      font-size: 34px;
      margin: 0 0 8px;
      letter-spacing: 2px;
    }

    #ov p {
      color: #aaa;
      font-size: 18px;
      margin: 0 0 18px;
      text-align: center;
      line-height: 1.8;
      white-space: pre-line;
    }

    #ov button {
      background: transparent;
      border: 1px solid #7ef8ff;
      color: #7ef8ff;
      padding: 14px 38px;
      font-family: "Courier New", monospace;
      font-size: 18px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
    }

    #ov button:hover {
      background: rgba(126, 248, 255, 0.12);
    }

    #adm {
      display: none;
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(5, 15, 25, 0.97);
      border: 1px solid #ff0;
      border-radius: 10px;
      padding: 16px 22px;
      min-width: 420px;
      z-index: 10;
    }

    #adm .atitle {
      color: #ff0;
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 14px;
      text-align: center;
    }

    #adm .arow {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    #adm button {
      background: transparent;
      border: 1px solid #ff0;
      color: #ff0;
      font-family: "Courier New", monospace;
      font-size: 14px;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 1px;
    }

    #adm button:hover {
      background: rgba(255, 255, 0, 0.12);
    }

    #adm button.active {
      background: rgba(255, 255, 0, 0.18);
      box-shadow: 0 0 0 1px rgba(255, 255, 0, 0.28);
    }

    #adm .aclose {
      position: absolute;
      top: 8px;
      right: 12px;
      border: none;
      color: #ff0;
      font-size: 16px;
      padding: 2px 6px;
      background: transparent;
      cursor: pointer;
    }

    #cheat {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 0, 0.15);
      font-size: 12px;
      pointer-events: none;
      letter-spacing: 1px;
    }

    @media (max-width: 760px) {
      #hud {
        padding: 8px 10px;
      }

      #hud span {
        font-size: 15px;
        padding: 5px 8px;
      }

      #lv {
        right: 10px;
      }

      #ov h2 {
        font-size: 22px;
      }

      #ov p {
        font-size: 13px;
        padding: 0 12px;
      }

    }

    @media (min-width: 1200px), (min-height: 900px) {
      #hud span {
        font-size: 30px;
        padding: 12px 22px;
      }
    }

    :fullscreen #adm,
    :-webkit-full-screen #adm {
      min-width: 860px;
      padding: 34px 40px;
      bottom: 40px;
      border-width: 2px;
      border-radius: 12px;
    }

    :fullscreen #adm .atitle,
    :-webkit-full-screen #adm .atitle {
      font-size: 28px;
      margin-bottom: 24px;
    }

    :fullscreen #adm .arow,
    :-webkit-full-screen #adm .arow {
      gap: 20px;
    }

    :fullscreen #adm button,
    :-webkit-full-screen #adm button {
      font-size: 22px;
      padding: 17px 30px;
    }

    :fullscreen #adm .aclose,
    :-webkit-full-screen #adm .aclose {
      font-size: 30px;
      top: 12px;
      right: 16px;
    }
  </style>
</head>
<body>
  <div id="gc">
    <canvas id="c"></canvas>
    <div id="hud">
      <span id="sc">SCORE: 0</span>
      <span id="wv">WAVE 1/20</span>
      <span id="lv">HP: 3</span>
    </div>
    <div id="ov">
      <h2>SPACE SHOOTER</h2>
      <p>WASD / arrows - movement
Hold left mouse button - shooting
SPACE - also shoots</p>
      <button id="sb">START</button>
    </div>
    <div id="adm">
      <button class="aclose" id="admclose">X</button>
      <div class="atitle">ADMIN PANEL</div>
      <div class="arow">
        <button id="agod">GOD MODE</button>
        <button id="aspeed">SPEED MODE</button>
        <button id="askip">SKIP WAVE</button>
        <button id="arapid">RAPID FIRE</button>
        <button id="aclear">CLEAR ENEMIES</button>
      </div>
    </div>
    <div id="cheat">armacheat</div>
  </div>
  <script>
    const root = document.getElementById("gc");
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    let W = 0;
    let H = 0;
    let state = "menu";
    let score = 0;
    let lives = 3;
    let wave = 1;
    let frame = 0;
    let player;
    let bullets;
    let enemies;
    let bonuses;
    let particles;
    let explosions;
    let stars;
    let keys = {};
    let cooldown = 0;
    let wt = 0;
    let mouseDown = false;
    let rapidFire = false;
    let speedMode = false;
    let rapidBoostTimer = 0;
    let speedBoostTimer = 0;
    let shieldBoostTimer = 0;
    let bonusSpawnTimer = 0;
    let waveScale = 1;
    let cheatBuf = "";
    let waveQueued = false;
    let godMode = false;
    const WAVE_INTRO_FRAMES = 72;
    const ADMIN_CODES = ["armacheat"];
    const ADMIN_CODE_MAX = Math.max(...ADMIN_CODES.map((code) => code.length));
    const RAPID_DURATION = 180;
    const MEGA_DURATION = 120;
    const SHIELD_DURATION = 300;

    function resizeGame() {
      const prevW = W || 680;
      const prevH = H || 480;
      const rect = root.getBoundingClientRect();
      W = Math.max(320, Math.floor(rect.width));
      H = Math.max(240, Math.floor(rect.height));
      canvas.width = W;
      canvas.height = H;

      if (player) {
        player.x = (player.x / prevW) * W;
        player.y = (player.y / prevH) * H;
      }

      if (enemies && enemies.length) {
        relayoutEnemies();
      }

      if (stars && stars.length) {
        stars.forEach((s) => {
          s.x = Math.min(W, (s.x / prevW) * W);
          s.y = Math.min(H, (s.y / prevH) * H);
        });
      }
    }

    function viewScale() {
      return Math.max(0.92, Math.min(W / 680, H / 480, 2.6));
    }

    function playerSize() {
      return 1.15 * viewScale() * Math.max(0.9, waveScale + 0.02);
    }

    function enemySize(type) {
      const base = type === "finalBoss" ? 3.2 : type === "boss" ? 1.5 : type === "fast" ? 1.2 : 1.3;
      return base * viewScale() * waveScale;
    }

    function bonusRadius() {
      return 15 * Math.max(0.9, Math.min(1.5, viewScale()));
    }

    function bonusArea() {
      return {
        left: W * 0.08,
        right: W * 0.92,
        top: H * 0.48,
        bottom: H * 0.8
      };
    }

    function spawnBonus(type) {
      const area = bonusArea();
      const r = bonusRadius();
      bonuses.push({
        type,
        x: area.left + Math.random() * Math.max(40, area.right - area.left),
        y: area.top + Math.random() * Math.max(40, area.bottom - area.top),
        r,
        pulse: Math.random() * Math.PI * 2
      });
    }

    function maybeSpawnBonus(force) {
      if (!bonuses) bonuses = [];
      if (!force && bonuses.length >= 1) return;
      if (!force && Math.random() < 0.5) return;
      const eligible = [];
      if (wave >= 5) eligible.push({ type: "speed", weight: 50 });
      if (wave >= 10) eligible.push({ type: "rapid", weight: 24 });
      if (wave >= 10) eligible.push({ type: "shield", weight: 24 });
      if (wave >= 15) eligible.push({ type: "mega", weight: 8 });
      if (!eligible.length) return;
      const totalWeight = eligible.reduce((sum, item) => sum + item.weight, 0);
      let roll = Math.random() * totalWeight;
      let type = eligible[0].type;
      for (const item of eligible) {
        roll -= item.weight;
        if (roll <= 0) {
          type = item.type;
          break;
        }
      }
      spawnBonus(type);
    }

    const SHAPES = [
      [[0, -2], [-1, -1], [1, -1], [-2, 0], [2, 0]],
      [[0, -2], [-1, -1], [1, -1], [-2, 0], [2, 0], [-1, 1], [1, 1], [0, 2]],
      [[0, -2], [0, -1], [0, 0], [0, 1], [0, 2], [-2, 0], [-1, 0], [1, 0], [2, 0]],
      [[0, -2], [-1, -1], [1, -1], [-2, 0], [2, 0], [-3, 1], [3, 1], [-1, 1], [1, 1]],
      [[0, -3], [2, -2], [3, 0], [2, 2], [0, 3], [-2, 2], [-3, 0], [-2, -2]],
      [[0, -3], [2, -2], [3, 0], [2, 2], [0, 3], [-2, 2], [-3, 0], [-2, -2], [0, 0]],
      [[-3, -2], [-2, -1], [-1, 0], [0, 1], [1, 0], [2, -1], [3, -2], [-1, -2], [1, -2]],
      [[0, -3], [2, -1], [3, 1], [1, 2], [-1, 2], [-3, 1], [-2, -1], [0, 0], [1, -1], [-1, -1]],
      [[-4, -1], [-3, 0], [-2, 1], [-1, 0], [0, -1], [1, 0], [2, 1], [3, 0], [4, -1]],
      [[-2, -3], [0, -3], [2, -3], [-3, -1], [3, -1], [-3, 1], [3, 1], [-1, 2], [1, 2], [0, -1]]
    ];

    function getFormation(w) {
      const idx = Math.min(Math.floor((w - 1) / 2), SHAPES.length - 1);
      const base = SHAPES[idx].map((p) => [...p]);
      if (w <= 2) return base.slice(0, 5);
      if (w > 14) {
        const ext = [];
        base.forEach(([x, y]) => {
          ext.push([x - 2, y]);
          ext.push([x + 2, y]);
        });
        const seen = new Set();
        return ext.filter(([x, y]) => {
          const key = x + "," + y;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }
      if (w > 10) {
        const ext = [];
        base.forEach(([x, y]) => {
          ext.push([x, y]);
          ext.push([x + 3, y]);
        });
        const seen = new Set();
        return ext.filter(([x, y]) => {
          const key = x + "," + y;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }
      return base;
    }

    function waveConfig(w) {
      const t = (w - 1) / 19;
      return {
        swayAmp: w <= 2 ? 0 : 4 + t * 40,
        swaySpd: w <= 2 ? 0 : 0.005 + t * 0.028,
        shootRate: w <= 2 ? 400 : Math.max(35, 380 - t * 345),
        bulletSpd: 1.2 + t * 4
      };
    }

    function spawnFinalBoss() {
      const cfg = {
        swayAmp: 28,
        swaySpd: 0.02,
        shootRate: 50,
        bulletSpd: 3.2
      };
      const boss = {
        type: "finalBoss",
        x: W / 2,
        y: Math.max(100, H * 0.19),
        baseX: W / 2,
        dx: 0,
        dy: 0,
        hp: 120,
        maxHp: 120,
        shootTimer: 45,
        cfg,
        attackCycle: 0
      };
      enemies.push(boss);
    }

    function spawnWave() {
      enemies = [];
      bullets = [];
      bonuses = [];
      frame = 0;
      waveQueued = false;
      bonusSpawnTimer = 220;
      rapidBoostTimer = 0;
      speedBoostTimer = 0;
      shieldBoostTimer = 0;
      if (player) {
        player.x = W / 2;
        player.y = H - Math.max(80, H * 0.12);
      }
      if (wave === 20) {
        waveScale = 0.98;
        spawnFinalBoss();
        return;
      }
      const form = getFormation(wave);
      waveScale = Math.max(0.72, 1 - Math.max(0, form.length - 8) * 0.028);
      const cfg = waveConfig(wave);
      const cx = W / 2;
      const cy = Math.max(150, H * 0.3);
      const maxScaleFromWidth = W / 13.5;
      const maxScaleFromHeight = H / 11;
      const maxScaleFromTop = (cy - 34) / 2;
      const scale = Math.max(22, Math.min(maxScaleFromWidth, maxScaleFromHeight, maxScaleFromTop) * Math.max(0.82, waveScale));
      form.forEach(([dx, dy], i) => {
        const type = wave <= 2 ? "basic" : i % 6 === 0 && wave > 5 ? "boss" : i % 3 === 0 && wave > 3 ? "fast" : "basic";
        const baseX = Math.max(40, Math.min(W - 40, cx + dx * scale));
        const y = Math.max(72, Math.min(H * 0.68, cy + dy * scale));
        enemies.push({ x: baseX, y, baseX, dx, dy, type, hp: type === "boss" ? 2 : 1, shootTimer: 80 + Math.random() * cfg.shootRate, cfg });
      });
      if (Math.random() < 0.7) maybeSpawnBonus(true);
      if (Math.random() < 0.3) spawnBonus("medkit");
    }

    function relayoutEnemies() {
      if (!enemies || !enemies.length) return;
      const cx = W / 2;
      const cy = Math.max(150, H * 0.3);
      const maxScaleFromWidth = W / 13.5;
      const maxScaleFromHeight = H / 11;
      const maxScaleFromTop = (cy - 34) / 2;
      const scale = Math.max(22, Math.min(maxScaleFromWidth, maxScaleFromHeight, maxScaleFromTop) * Math.max(0.82, waveScale));
      enemies.forEach((e) => {
        if (typeof e.dx !== "number" || typeof e.dy !== "number") return;
        e.baseX = Math.max(40, Math.min(W - 40, cx + e.dx * scale));
        e.x = e.baseX;
        e.y = Math.max(72, Math.min(H * 0.68, cy + e.dy * scale));
      });
      if (bonuses && bonuses.length) {
        const area = bonusArea();
        const r = bonusRadius();
        bonuses.forEach((b) => {
          b.r = r;
          b.x = Math.max(area.left, Math.min(area.right, b.x));
          b.y = Math.max(area.top, Math.min(area.bottom, b.y));
        });
      }
    }

    function init() {
      resizeGame();
      score = 0;
      lives = 3;
      wave = 1;
      frame = 0;
      cooldown = 0;
      wt = 0;
      waveQueued = false;
      mouseDown = false;
      rapidFire = false;
      speedMode = false;
      rapidBoostTimer = 0;
      speedBoostTimer = 0;
      shieldBoostTimer = 0;
      bonusSpawnTimer = 0;
      player = { x: W / 2, y: H - Math.max(80, H * 0.12), invul: 0 };
      bullets = [];
      enemies = [];
      bonuses = [];
      particles = [];
      explosions = [];
      stars = Array.from({ length: 80 }, () => ({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 1.4 + 0.3, spd: Math.random() * 0.4 + 0.15 }));
      spawnWave();
    }

    function spark(x, y, col, n) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 3 + 1;
        particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, col, sz: Math.random() * 2.5 + 1 });
      }
    }

    function drawShip(x, y, inv) {
      if (inv > 0 && Math.floor(inv / 5) % 2) return;
      const s = playerSize();
      const rapidOn = rapidFire || rapidBoostTimer > 0;
      ctx.save();
      ctx.translate(x, y);
      const g = ctx.createLinearGradient(0, -20 * s, 0, 20 * s);
      g.addColorStop(0, rapidOn ? "#ffee44" : "#7ef8ff");
      g.addColorStop(1, rapidOn ? "#aa6600" : "#1a6a8a");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(0, -16 * s);
      ctx.lineTo(14 * s, 10 * s);
      ctx.lineTo(6 * s, 6 * s);
      ctx.lineTo(0, 10 * s);
      ctx.lineTo(-6 * s, 6 * s);
      ctx.lineTo(-14 * s, 10 * s);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#fff8a0";
      ctx.beginPath();
      ctx.arc(0, -2 * s, 4.5 * s, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawEnemy(e) {
      const s = enemySize(e.type);
      ctx.save();
      ctx.translate(e.x, e.y);
      if (e.type === "boss") {
        ctx.fillStyle = e.hp === 2 ? "#ff4466" : "#ff8899";
        ctx.beginPath();
        ctx.moveTo(0, -12 * s);
        ctx.lineTo(12 * s, 8 * s);
        ctx.lineTo(6 * s, 4 * s);
        ctx.lineTo(0, 8 * s);
        ctx.lineTo(-6 * s, 4 * s);
        ctx.lineTo(-12 * s, 8 * s);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#050505";
        ctx.lineWidth = Math.max(1.8, 2.2 * s);
        ctx.strokeStyle = "rgba(0,0,0,0.55)";
        ctx.font = "700 " + Math.max(11, Math.round(9.5 * s)) + "px 'Doto', monospace";
        ctx.fontVariationSettings = "'ROND' 100";
        ctx.textAlign = "center";
        ctx.strokeText(e.hp, 0, 2.5 * s);
        ctx.fillText(e.hp, 0, 2.5 * s);
      } else if (e.type === "finalBoss") {
        ctx.fillStyle = "#ff2c54";
        ctx.beginPath();
        ctx.moveTo(0, -18 * s);
        ctx.lineTo(18 * s, -2 * s);
        ctx.lineTo(12 * s, 14 * s);
        ctx.lineTo(0, 10 * s);
        ctx.lineTo(-12 * s, 14 * s);
        ctx.lineTo(-18 * s, -2 * s);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#ff9ab0";
        ctx.beginPath();
        ctx.arc(0, -2 * s, 7 * s, 0, Math.PI * 2);
        ctx.fill();
      } else if (e.type === "fast") {
        ctx.fillStyle = "#ffaa22";
        ctx.beginPath();
        ctx.moveTo(0, -10 * s);
        ctx.lineTo(10 * s, 8 * s);
        ctx.lineTo(0, 4 * s);
        ctx.lineTo(-10 * s, 8 * s);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillStyle = "#aa44ff";
        ctx.beginPath();
        ctx.moveTo(0, -11 * s);
        ctx.lineTo(11 * s, 8 * s);
        ctx.lineTo(4 * s, 4 * s);
        ctx.lineTo(0, 8 * s);
        ctx.lineTo(-4 * s, 4 * s);
        ctx.lineTo(-11 * s, 8 * s);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#cc88ff";
        ctx.beginPath();
        ctx.arc(0, -1 * s, 3.5 * s, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawBonus(b) {
      const pulse = 1 + Math.sin(frame * 0.08 + b.pulse) * 0.08;
      const r = b.r * pulse;
      const colors = b.type === "rapid"
        ? ["#ffe96b", "#ff9800"]
        : b.type === "speed"
          ? ["#6bffcb", "#1fa883"]
          : b.type === "medkit"
            ? ["#ffb3b3", "#ff3b3b"]
          : b.type === "shield"
            ? ["#7ef8ff", "#2868ff"]
            : ["#7ef8ff", "#c6ff54"];
      ctx.save();
      ctx.translate(b.x, b.y);
      const grad = ctx.createRadialGradient(-r * 0.25, -r * 0.3, 2, 0, 0, r);
      grad.addColorStop(0, colors[0]);
      grad.addColorStop(1, colors[1]);
      ctx.fillStyle = grad;
      ctx.shadowBlur = 16;
      ctx.shadowColor = colors[0];
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,0.55)";
      ctx.stroke();
      ctx.fillStyle = "#07111a";
      ctx.strokeStyle = "#07111a";
      ctx.lineWidth = 2.5;
      if (b.type === "rapid") {
        ctx.beginPath();
        ctx.moveTo(-3, -8);
        ctx.lineTo(4, -2);
        ctx.lineTo(0, -2);
        ctx.lineTo(5, 8);
        ctx.lineTo(-4, 1);
        ctx.lineTo(0, 1);
        ctx.closePath();
        ctx.fill();
      } else if (b.type === "speed") {
        ctx.beginPath();
        ctx.moveTo(-8, 2);
        ctx.lineTo(2, 2);
        ctx.lineTo(2, 7);
        ctx.lineTo(10, 0);
        ctx.lineTo(2, -7);
        ctx.lineTo(2, -2);
        ctx.lineTo(-8, -2);
        ctx.closePath();
        ctx.fill();
      } else if (b.type === "shield") {
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, 4, 0, Math.PI * 2);
        ctx.fill();
      } else if (b.type === "medkit") {
        ctx.fillRect(-3, -9, 6, 18);
        ctx.fillRect(-9, -3, 18, 6);
      } else if (b.type === "mega") {
        ctx.beginPath();
        ctx.moveTo(0, -9);
        ctx.lineTo(4, -2);
        ctx.lineTo(10, 0);
        ctx.lineTo(4, 2);
        ctx.lineTo(0, 9);
        ctx.lineTo(-4, 2);
        ctx.lineTo(-10, 0);
        ctx.lineTo(-4, -2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function nextWave() {
      if (wave >= 20) {
        state = "win";
        showOv("YOU WIN!", "All 20 waves cleared.\nScore: " + score, "PLAY AGAIN");
        return;
      }
      wave++;
      wt = WAVE_INTRO_FRAMES;
      spawnWave();
    }

    function update() {
      frame++;
      if (wt > 0) {
        wt--;
        return;
      }
      stars.forEach((s) => {
        s.y += s.spd;
        if (s.y > H) s.y = 0;
      });

      if (rapidBoostTimer > 0) rapidBoostTimer--;
      if (speedBoostTimer > 0) speedBoostTimer--;
      if (shieldBoostTimer > 0) shieldBoostTimer--;
      if (bonusSpawnTimer > 0) {
        bonusSpawnTimer--;
      } else if (state === "playing" && wave < 20) {
        maybeSpawnBonus(false);
        bonusSpawnTimer = 420;
      }

      const shipRadius = 20 * playerSize();
      const speedBoostOn = speedMode || speedBoostTimer > 0;
      const rapidOn = rapidFire || rapidBoostTimer > 0;
      const spd = (speedBoostOn ? 7.2 : 5) * Math.min(1.6, viewScale());
      if (keys.ArrowLeft || keys.a || keys.A) player.x -= spd;
      if (keys.ArrowRight || keys.d || keys.D) player.x += spd;
      if (keys.ArrowUp || keys.w || keys.W) player.y -= spd;
      if (keys.ArrowDown || keys.s || keys.S) player.y += spd;
      player.x = Math.max(shipRadius, Math.min(W - shipRadius, player.x));
      player.y = Math.max(shipRadius, Math.min(H - shipRadius, player.y));

      if (player.invul > 0) player.invul--;
      if (cooldown > 0) cooldown--;
      const fireRate = rapidOn ? 2 : 10;
      if ((keys[" "] || keys.z || mouseDown) && cooldown <= 0) {
        bullets.push({ x: player.x, y: player.y - 18 * playerSize(), spd: 13 * Math.min(1.5, viewScale()), own: "p" });
        if (rapidOn) {
          bullets.push({ x: player.x - 10 * playerSize(), y: player.y - 12 * playerSize(), spd: 13 * Math.min(1.5, viewScale()), own: "p" });
          bullets.push({ x: player.x + 10 * playerSize(), y: player.y - 12 * playerSize(), spd: 13 * Math.min(1.5, viewScale()), own: "p" });
        }
        cooldown = fireRate;
      }

      if (bonuses && bonuses.length) {
        for (let i = bonuses.length - 1; i >= 0; i--) {
          const b = bonuses[i];
          if (Math.abs(b.x - player.x) < shipRadius + b.r && Math.abs(b.y - player.y) < shipRadius + b.r) {
            if (b.type === "rapid") {
              rapidBoostTimer = RAPID_DURATION;
            } else if (b.type === "speed") {
              speedBoostTimer = RAPID_DURATION;
            } else if (b.type === "medkit") {
              lives = Math.min(3, lives + 1);
            } else if (b.type === "shield") {
              shieldBoostTimer = SHIELD_DURATION;
            } else {
              rapidBoostTimer = MEGA_DURATION;
              speedBoostTimer = MEGA_DURATION;
            }
            spark(b.x, b.y, b.type === "speed" ? "#6bffcb" : b.type === "mega" ? "#c6ff54" : b.type === "shield" ? "#7ef8ff" : b.type === "medkit" ? "#ff6b6b" : "#ffe96b", 12);
            bonuses.splice(i, 1);
            bonusSpawnTimer = 320;
          }
        }
      }

      enemies.forEach((e) => {
        e.x = e.baseX + Math.sin(frame * e.cfg.swaySpd + e.baseX * 0.03) * e.cfg.swayAmp;
        e.shootTimer--;
        if (e.type === "finalBoss") {
          if (e.shootTimer <= 0) {
            if (e.attackCycle === 0) {
              const dx = player.x - e.x;
              const dy = player.y - e.y;
              const len = Math.max(1, Math.hypot(dx, dy));
              for (let spread = -1; spread <= 1; spread++) {
                bullets.push({
                  x: e.x + spread * 16,
                  y: e.y + 18 * enemySize(e.type),
                  vx: (dx / len) * 2.6 + spread * 0.7,
                  vy: (dy / len) * 2.6,
                  own: "e"
                });
              }
              e.shootTimer = 34;
            } else if (e.attackCycle === 1) {
              for (let k = 0; k < 12; k++) {
                const a = (Math.PI * 2 * k) / 12;
                bullets.push({
                  x: e.x,
                  y: e.y + 10,
                  vx: Math.cos(a) * 2.5,
                  vy: Math.sin(a) * 2.5,
                  own: "e"
                });
              }
              e.shootTimer = 60;
            } else {
              for (let k = 0; k < 6; k++) {
                bullets.push({
                  x: W * (0.14 + k * 0.14) + Math.random() * 24,
                  y: e.y + 8,
                  vx: 0,
                  vy: 3.7,
                  own: "e"
                });
              }
              e.shootTimer = 52;
            }
            e.attackCycle = (e.attackCycle + 1) % 3;
          }
        } else if (e.shootTimer <= 0) {
          bullets.push({ x: e.x, y: e.y + 14 * enemySize(e.type), spd: e.cfg.bulletSpd * Math.min(1.4, viewScale()) * Math.max(0.88, waveScale), own: "e" });
          e.shootTimer = e.cfg.shootRate * 0.5 + Math.random() * e.cfg.shootRate;
        }
      });

      bullets.forEach((b) => {
        if (typeof b.vx === "number" || typeof b.vy === "number") {
          b.x += b.vx || 0;
          b.y += b.vy || 0;
        } else {
          b.y += b.own === "p" ? -b.spd : b.spd;
        }
      });
      bullets = bullets.filter((b) => b.y > -30 && b.y < H + 30 && b.x > -30 && b.x < W + 30);

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (b.own !== "p") continue;
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          const hit = 13.5 * enemySize(e.type);
          if (Math.abs(b.x - e.x) < hit && Math.abs(b.y - e.y) < hit) {
            bullets.splice(i, 1);
            e.hp--;
            spark(e.x, e.y, e.type === "boss" ? "#ff4466" : e.type === "fast" ? "#ffaa22" : "#cc88ff", 5);
            if (e.hp <= 0) {
              explosions.push({ x: e.x, y: e.y, r: 0, life: 1 });
              spark(e.x, e.y, "#fff", 12);
              score += e.type === "finalBoss" ? 1000 : e.type === "boss" ? 30 : e.type === "fast" ? 15 : 10;
              enemies.splice(j, 1);
            }
            break;
          }
        }
      }

      if (player.invul <= 0) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          if (b.own !== "e") continue;
          const hit = 14.5 * playerSize();
          if (Math.abs(b.x - player.x) < hit && Math.abs(b.y - player.y) < hit) {
            bullets.splice(i, 1);
            if (shieldBoostTimer > 0) {
              spark(b.x, b.y, "#7ef8ff", 8);
              continue;
            }
            if (!godMode) {
              lives--;
              player.invul = 100;
              spark(player.x, player.y, "#7ef8ff", 14);
              if (lives <= 0) {
                state = "over";
                showOv("GAME OVER", "Score: " + score + "\nReached wave: " + wave, "PLAY AGAIN");
              }
            }
          }
        }
      }

      particles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.92;
        p.vy *= 0.92;
        p.life -= 0.04;
      });
      particles = particles.filter((p) => p.life > 0);
      explosions.forEach((e) => {
        e.r += 3;
        e.life -= 0.07;
      });
      explosions = explosions.filter((e) => e.life > 0);

      if (enemies.length === 0 && wt === 0 && !waveQueued) {
        waveQueued = true;
        nextWave();
      }

      document.getElementById("wv").textContent = "WAVE: " + wave + "/20";
      document.getElementById("lv").textContent = "HP: " + Math.max(0, lives);
    }

    function draw() {
      ctx.fillStyle = "#0a0a1a";
      ctx.fillRect(0, 0, W, H);
      stars.forEach((s) => {
        ctx.fillStyle = "rgba(200,220,255," + (s.s * 0.4) + ")";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.s / 2, 0, Math.PI * 2);
        ctx.fill();
      });

      if (wt > 0) {
        const a = Math.min(1, wt > WAVE_INTRO_FRAMES - 18 ? 1 : (WAVE_INTRO_FRAMES - wt) / 18);
        ctx.fillStyle = "rgba(126,248,255," + a + ")";
        ctx.font = "bold 34px Courier New";
        ctx.textAlign = "center";
        ctx.fillText("NEXT WAVE " + wave, W / 2, H / 2 - 16);
        ctx.font = "18px Courier New";
        ctx.fillStyle = "rgba(170,170,170," + a + ")";
        ctx.fillText("Get ready", W / 2, H / 2 + 20);
        return;
      }

      explosions.forEach((e) => {
        ctx.strokeStyle = "rgba(255,180,60," + e.life + ")";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
        ctx.stroke();
      });
      particles.forEach((p) => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.col;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      bullets.forEach((b) => {
        if (b.own === "p") {
          const rapidOn = rapidFire || rapidBoostTimer > 0;
          ctx.fillStyle = rapidOn ? "#ffee44" : "#7ef8ff";
          ctx.shadowBlur = 6;
          ctx.shadowColor = rapidOn ? "#ffee44" : "#7ef8ff";
          const bw = Math.max(4, 5 * Math.max(0.84, waveScale));
          const bh = Math.max(12, 16 * Math.max(0.84, waveScale));
          ctx.fillRect(b.x - bw / 2, b.y - bh * 0.7, bw, bh);
          ctx.shadowBlur = 0;
        } else {
          ctx.fillStyle = "#ff6644";
          const ew = Math.max(3, 5 * Math.max(0.78, waveScale));
          const eh = Math.max(9, 11 * Math.max(0.78, waveScale));
          ctx.fillRect(b.x - ew / 2, b.y - eh / 2, ew, eh);
        }
      });
      bonuses.forEach((b) => drawBonus(b));
      enemies.forEach((e) => drawEnemy(e));
      drawShip(player.x, player.y, player.invul);

      const boss = enemies.find((e) => e.type === "finalBoss");
      if (boss) {
        const barW = Math.min(W * 0.64, 520);
        const barH = Math.max(16, 18 * viewScale());
        const bx = (W - barW) / 2;
        const by = 14;
        ctx.fillStyle = "rgba(40,0,0,0.72)";
        ctx.fillRect(bx, by, barW, barH);
        ctx.fillStyle = "#ff304f";
        ctx.fillRect(bx, by, barW * Math.max(0, boss.hp / boss.maxHp), barH);
        ctx.strokeStyle = "rgba(255,180,190,0.9)";
        ctx.lineWidth = 2;
        ctx.strokeRect(bx, by, barW, barH);
        ctx.fillStyle = "#ffd8dd";
        ctx.font = "bold " + Math.max(12, Math.round(13 * viewScale())) + "px Courier New";
        ctx.textAlign = "center";
        ctx.fillText("BOSS HP", W / 2, by + barH - 4);
      }

      if (shieldBoostTimer > 0) {
        const shieldR = 24 * playerSize() + Math.sin(frame * 0.18) * 3;
        ctx.strokeStyle = "rgba(126,248,255,0.85)";
        ctx.lineWidth = Math.max(2, 2.2 * viewScale());
        ctx.shadowBlur = 12;
        ctx.shadowColor = "#7ef8ff";
        ctx.beginPath();
        ctx.arc(player.x, player.y, shieldR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      if (rapidFire || rapidBoostTimer > 0) {
        ctx.fillStyle = "rgba(255,238,68,0.18)";
        ctx.font = "bold " + Math.max(14, Math.round(14 * viewScale())) + "px Courier New";
        ctx.textAlign = "left";
        const rapidLabel = rapidFire ? "* RAPID FIRE: ON" : "* RAPID FIRE: " + Math.ceil(rapidBoostTimer / 60) + "S";
        ctx.fillText(rapidLabel, 14, H - 16);
      }

      if (speedBoostTimer > 0) {
        ctx.fillStyle = "rgba(107,255,203,0.2)";
        ctx.font = "bold " + Math.max(14, Math.round(14 * viewScale())) + "px Courier New";
        ctx.textAlign = "left";
        ctx.fillText("* SPEED: " + Math.ceil(speedBoostTimer / 60) + "S", 14, H - 42);
      } else if (speedMode) {
        ctx.fillStyle = "rgba(107,255,203,0.2)";
        ctx.font = "bold " + Math.max(14, Math.round(14 * viewScale())) + "px Courier New";
        ctx.textAlign = "left";
        ctx.fillText("* SPEED MODE: ON", 14, H - 42);
      }

      if (shieldBoostTimer > 0) {
        ctx.fillStyle = "rgba(126,248,255,0.22)";
        ctx.font = "bold " + Math.max(14, Math.round(14 * viewScale())) + "px Courier New";
        ctx.textAlign = "left";
        ctx.fillText("* SHIELD: " + Math.ceil(shieldBoostTimer / 60) + "S", 14, H - 68);
      }

      if (godMode) {
        ctx.fillStyle = "rgba(126,248,255,0.18)";
        ctx.font = "bold " + Math.max(14, Math.round(14 * viewScale())) + "px Courier New";
        ctx.textAlign = "right";
        ctx.fillText("* GOD MODE: ON", W - 14, H - 16);
      }
    }

    function loop() {
      if (state !== "playing") return;
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function showOv(t, p, b) {
      const o = document.getElementById("ov");
      o.querySelector("h2").textContent = t;
      o.querySelector("p").textContent = p;
      o.querySelector("button").textContent = b;
      o.style.display = "flex";
    }

    function toggleAdmin() {
      const adm = document.getElementById("adm");
      adm.style.display = adm.style.display === "block" ? "none" : "block";
    }

    function syncAdminButtons() {
      document.getElementById("agod").classList.toggle("active", godMode);
      document.getElementById("aspeed").classList.toggle("active", speedMode);
      document.getElementById("arapid").classList.toggle("active", rapidFire);
    }

    document.getElementById("sb").addEventListener("click", () => {
      document.getElementById("ov").style.display = "none";
      init();
      state = "playing";
      loop();
    });

    document.getElementById("admclose").addEventListener("click", () => {
      document.getElementById("adm").style.display = "none";
    });

    document.getElementById("agod").addEventListener("click", () => {
      godMode = !godMode;
      syncAdminButtons();
    });

    document.getElementById("aspeed").addEventListener("click", () => {
      speedMode = !speedMode;
      syncAdminButtons();
    });

    document.getElementById("askip").addEventListener("click", () => {
      if (state === "playing") {
        enemies = [];
        bullets = [];
        waveQueued = false;
        nextWave();
      }
    });

    document.getElementById("arapid").addEventListener("click", () => {
      if (state === "playing") {
        rapidFire = !rapidFire;
        syncAdminButtons();
      }
    });

    document.getElementById("aclear").addEventListener("click", () => {
      if (state === "playing") {
        enemies.forEach((e) => {
          explosions.push({ x: e.x, y: e.y, r: 0, life: 1 });
          spark(e.x, e.y, "#fff", 10);
          score += 10;
        });
        enemies = [];
        bullets = [];
        waveQueued = false;
      }
    });

    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (e.key === " ") e.preventDefault();
      if (state === "playing" && wt > 0 && (e.key === " " || e.key === "Enter")) wt = 0;
      cheatBuf = (cheatBuf + e.key.toLowerCase()).slice(-ADMIN_CODE_MAX);
      if (ADMIN_CODES.some((code) => cheatBuf.endsWith(code))) toggleAdmin();
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    canvas.addEventListener("mousedown", (e) => {
      if (state === "playing" && wt > 0 && e.button === 0) {
        wt = 0;
        return;
      }
      if (e.button === 0) mouseDown = true;
    });

    document.addEventListener("mouseup", (e) => {
      if (e.button === 0) mouseDown = false;
    });

    window.addEventListener("resize", resizeGame);
    syncAdminButtons();
    resizeGame();
  </script>
</body>
</html>
